          { time: "9:00–9:30", icon: "📰", task: "Newspaper + reel idea notes", type: "content" },
          { time: "9:30–10:00", icon: "🥣", task: "Breakfast", type: "routine" },
          { time: "10:00–12:00", icon: "💻", task: "Office work", type: "office" },
          { time: "12:00–12:30", icon: "💡", task: "FLEX: Bookmark 3 open roles + write cover letter template", type: "flex" },
          { time: "12:30–2:30", icon: "💻", task: "Office + lunch", type: "office" },
          { time: "2:30–4:30", icon: "🤝", task: "Meetings", type: "office" },
          { time: "4:30–7:30", icon: "💻", task: "Office work", type: "office" },
          { time: "7:30–8:00", icon: "🍽️", task: "Dinner", type: "routine" },
          { time: "8:00–8:30", icon: "👧", task: "Daughter time", type: "family" },
          { time: "8:30–10:30", icon: "✍️", task: "CREATIVE: Write + publish Substack #6 ✅ Week 2 done!", type: "creative" },
          { time: "11:00", icon: "🌙", task: "Sleep", type: "routine" },
        ],
        wins: ["📬 Substack #6 published (Week 2: 3/3 ✅)", "📋 Cover letter template ready"]
      },
      {
        date: "Mar 14", day: "SAT", label: "Day 13", theme: "Strategy Saturday",
        schedule: [
          { time: "7:30", icon: "☀️", task: "Wake up", type: "routine" },
          { time: "8:00–8:30", icon: "🏃", task: "Exercise — 30 min", type: "health" },
          { time: "8:30–9:00", icon: "☕", task: "Slow breakfast + newspaper", type: "routine" },
          { time: "9:00–10:30", icon: "🎯", task: "POWER SESSION: Write your personal brand positioning doc — niche, tone, what you stand for", type: "creative" },
          { time: "10:30–12:00", icon: "📮", task: "Apply to 2–3 roles with customized cover letters", type: "career" },
          { time: "12:00–1:00", icon: "🍽️", task: "Lunch + break", type: "routine" },
          { time: "2:00–3:30", icon: "📅", task: "Plan content calendar for next 15 days (newsletters + reels)", type: "creative" },
          { time: "3:30–5:00", icon: "📖", task: "Read book (extended)", type: "learn" },
          { time: "5:00–8:00", icon: "👨‍👩‍👧", task: "Family time", type: "family" },
          { time: "10:00", icon: "🌙", task: "Sleep", type: "routine" },
        ],
        wins: ["🎯 Brand doc done", "📮 3 job apps sent ✅", "📅 Next 15-day content planned"]
      },
      {
        date: "Mar 15", day: "SUN", label: "Day 14", theme: "Deep Review",
        schedule: [
          { time: "8:00", icon: "☀️", task: "Wake up — slow morning", type: "routine" },
          { time: "8:30–9:30", icon: "📖", task: "Read book — 1 hour", type: "learn" },
          { time: "9:30–10:30", icon: "🥞", task: "Slow breakfast", type: "routine" },
          { time: "11:00–12:00", icon: "🔍", task: "15-day review — count what you did vs planned. Score yourself.", type: "review" },
          { time: "12:00–1:00", icon: "📅", task: "Prep for next 15-day cycle", type: "review" },
          { time: "1:00–6:00", icon: "👨‍👩‍👧", task: "Family time / full rest", type: "family" },
          { time: "9:00", icon: "🌙", task: "Early sleep", type: "routine" },
        ],
        wins: ["🔍 Full 15-day reviewed", "📅 Next cycle planned ✅"]
      },
      {
        date: "Mar 16", day: "MON", label: "Day 15", theme: "Cycle 2 Begins",
        schedule: [
          { time: "6:30", icon: "☀️", task: "Wake up — habits are locked in now 💪", type: "routine" },
          { time: "6:30–7:00", icon: "🏃", task: "Exercise — 30 min", type: "health" },
          { time: "7:00–7:45", icon: "🚿", task: "Get ready", type: "routine" },
          { time: "7:45–8:15", icon: "📖", task: "Read book — 30 min", type: "learn" },
          { time: "8:15–9:00", icon: "🎒", task: "Daughter prep + school drop", type: "family" },
          { time: "9:00–9:30", icon: "📰", task: "Newspaper + reel idea notes", type: "content" },
          { time: "9:30–10:00", icon: "🥣", task: "Breakfast", type: "routine" },
          { time: "10:00–12:00", icon: "💻", task: "Office work", type: "office" },
          { time: "12:00–12:30", icon: "💡", task: "FLEX: Begin next cycle — new goals, new JDs to research", type: "flex" },
          { time: "12:30–7:30", icon: "💻", task: "Office work + lunch + meetings", type: "office" },
          { time: "7:30–8:00", icon: "🍽️", task: "Dinner", type: "routine" },
          { time: "8:00–8:30", icon: "👧", task: "Daughter time", type: "family" },
          { time: "8:30–10:30", icon: "✍️", task: "CREATIVE: Substack #7 — Cycle 2 begins!", type: "creative" },
          { time: "11:00", icon: "🌙", task: "Sleep", type: "routine" },
        ],
        wins: ["🔄 Cycle 2 STARTED", "📬 Substack #7 published"]
      },
    ];

    const typeColors = {
      routine: { bg: "#f3f4f6", text: "#4b5563", dot: "#9ca3af" },
      health: { bg: "#ecfdf5", text: "#065f46", dot: "#059669" },
      learn: { bg: "#fffbeb", text: "#92400e", dot: "#d97706" },
      family: { bg: "#fdf2f8", text: "#9d174d", dot: "#db2777" },
      content: { bg: "#f0f9ff", text: "#0c4a6e", dot: "#0284c7" },
      office: { bg: "#f8fafc", text: "#475569", dot: "#94a3b8" },
      flex: { bg: "#f5f3ff", text: "#4c1d95", dot: "#7c3aed" },
      creative: { bg: "#fff7ed", text: "#9a3412", dot: "#ea580c" },
      career: { bg: "#f0fdfa", text: "#134e4a", dot: "#0f766e" },
      review: { bg: "#eef2ff", text: "#312e81", dot: "#4338ca" },
    };

    function Planner() {
      const [selected, setSelected] = React.useState(0);
      const [completedTasks, setCompletedTasks] = React.useState({});

      const toggleTask = (dayIdx, taskIdx) => {
        const key = `${dayIdx}-${taskIdx}`;
        setCompletedTasks(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const day = days[selected];
      const completedCount = day.schedule.filter((_, i) => completedTasks[`${selected}-${i}`]).length;
      const progress = Math.round((completedCount / day.schedule.length) * 100);

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", minHeight: "100vh", background: "#faf9f7" }}>
          {/* Header */}
          <div style={{ background: "#1c1917", padding: "28px 20px 20px", position: "sticky", top: 0, zIndex: 50 }}>
            <div style={{ maxWidth: 860, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 4, flexWrap: "wrap" }}>
                <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 22, color: "#fafaf9", fontWeight: 800, letterSpacing: "-0.5px" }}>
                  15-Day Master Plan
                </h1>
                <span style={{ fontSize: 11, color: "#78716c", letterSpacing: "2px", textTransform: "uppercase" }}>
                  March 2–16, 2025
                </span>
              </div>
              <p style={{ fontSize: 12, color: "#57534e", marginBottom: 16 }}>
                Click a day · Check off tasks as you go
              </p>

              {/* Calendar Grid */}
              <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                {days.map((d, i) => {
                  const isWeekend = d.day === "SAT" || d.day === "SUN";
                  const isSelected = i === selected;
                  const completed = d.schedule.filter((_, ti) => completedTasks[`${i}-${ti}`]).length;
                  const allDone = completed === d.schedule.length && completed > 0;
                  const pct = completed / d.schedule.length;

                  return (
                    <button
                      key={i}
                      className="day-btn"
                      onClick={() => setSelected(i)}
                      style={{
                        width: 50, padding: "7px 4px", borderRadius: 8,
                        border: "none", cursor: "pointer",
                        background: isSelected ? "#e8845a" : allDone ? "#14532d" : isWeekend ? "#292524" : "#28211e",
                        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                        outline: isSelected ? "2px solid #f97316" : "none", outlineOffset: 1,
                      }}
                    >
                      <span style={{ fontSize: 9, color: isSelected ? "#fff" : "#78716c", letterSpacing: "1px", fontWeight: 600 }}>{d.day}</span>
                      <span style={{ fontSize: 13, color: isSelected ? "#fff" : allDone ? "#86efac" : isWeekend ? "#c8b6a6" : "#e7e5e4", fontWeight: 600 }}>
                        {d.date.split(" ")[1]}
                      </span>
                      {allDone
                        ? <span style={{ fontSize: 10, color: "#86efac" }}>✓</span>
                        : completed > 0
                        ? <div style={{ width: 28, height: 2, borderRadius: 1, background: "#44403c", marginTop: 1 }}>
                            <div style={{ width: `${pct * 100}%`, height: "100%", background: "#e8845a", borderRadius: 1 }} />
                          </div>
                        : null
                      }
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Main */}
          <div style={{ maxWidth: 860, margin: "0 auto", padding: "24px 16px" }}>
            {/* Day header */}
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontSize: 11, color: "#a8a29e", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 4 }}>
                  {day.label} · {day.day}, {day.date}
                </div>
                <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 28, color: "#1c1917", fontWeight: 800, letterSpacing: "-0.5px" }}>
                  {day.theme}
                </h2>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#a8a29e", marginBottom: 6 }}>DAILY PROGRESS</div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 120, height: 6, borderRadius: 3, background: "#e7e5e4" }}>
                    <div style={{ width: `${progress}%`, height: "100%", borderRadius: 3, background: "#e8845a", transition: "width 0.4s ease" }} />
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#57534e" }}>{progress}%</span>
                </div>
                <div style={{ fontSize: 11, color: "#a8a29e", marginTop: 3 }}>{completedCount}/{day.schedule.length} tasks</div>
              </div>
            </div>

            {/* Legend */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
              {Object.entries(typeColors).filter(([k]) => day.schedule.some(t => t.type === k)).map(([type, colors]) => (
                <span key={type} style={{ fontSize: 10, letterSpacing: "1px", textTransform: "uppercase", padding: "3px 8px", borderRadius: 20, background: colors.dot + "20", color: colors.dot, fontWeight: 600 }}>
                  ● {type}
                </span>
              ))}
            </div>

            {/* Schedule */}
            <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #e7e5e4", overflow: "hidden", marginBottom: 20 }}>
              {day.schedule.map((item, i) => {
                const isDone = completedTasks[`${selected}-${i}`];
                const colors = typeColors[item.type] || typeColors.routine;
                return (
                  <div key={i} className="task-row" style={{
                    display: "flex", alignItems: "center",
                    borderBottom: i < day.schedule.length - 1 ? "1px solid #f5f5f4" : "none",
                    opacity: isDone ? 0.45 : 1,
                    background: isDone ? "#fafaf9" : "transparent",
                  }}>
                    <div style={{ width: 4, alignSelf: "stretch", background: colors.dot, flexShrink: 0 }} />
                    <div style={{ width: 100, padding: "12px", fontSize: 11, color: "#a8a29e", flexShrink: 0, fontWeight: 500 }}>
                      {item.time}
                    </div>
                    <div style={{ width: 26, fontSize: 15, flexShrink: 0 }}>{item.icon}</div>
                    <div style={{ flex: 1, padding: "12px 8px", fontSize: 13, color: isDone ? "#a8a29e" : "#292524", textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4 }}>
                      {item.task}
                    </div>
                    <button className="check-btn" onClick={() => toggleTask(selected, i)} style={{
                      width: 26, height: 26, borderRadius: "50%",
                      border: `2px solid ${isDone ? colors.dot : "#d6d3d1"}`,
                      background: isDone ? colors.dot : "transparent",
                      flexShrink: 0, marginRight: 12,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 12, color: "#fff",
                    }}>
                      {isDone ? "✓" : ""}
                    </button>
                  </div>
                );
              })}
            </div>

            {/* Wins */}
            <div style={{ background: "#1c1917", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
              <div style={{ fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", color: "#57534e", marginBottom: 10 }}>
                🏆 End of Day Wins
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {day.wins.map((win, i) => (
                  <span key={i} className="win-tag" style={{ background: "#292524", padding: "6px 12px", borderRadius: 20, fontSize: 13, color: "#e7e5e4" }}>
                    {win}
                  </span>
                ))}
              </div>
            </div>

            {/* Nav */}
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <button onClick={() => setSelected(Math.max(0, selected - 1))} disabled={selected === 0}
                style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #e7e5e4", background: selected === 0 ? "#fafaf9" : "#fff", color: selected === 0 ? "#d6d3d1" : "#57534e", cursor: selected === 0 ? "default" : "pointer", fontSize: 13, fontWeight: 500 }}>
                ← Previous Day
              </button>
              <span style={{ fontSize: 12, color: "#a8a29e", alignSelf: "center" }}>{selected + 1} of 15</span>
              <button onClick={() => setSelected(Math.min(days.length - 1, selected + 1))} disabled={selected === days.length - 1}
                style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #e7e5e4", background: selected === days.length - 1 ? "#fafaf9" : "#fff", color: selected === days.length - 1 ? "#d6d3d1" : "#57534e", cursor: selected === days.length - 1 ? "default" : "pointer", fontSize: 13, fontWeight: 500 }}>
                Next Day →
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Planner />);
  </script>
</body>
</html>
